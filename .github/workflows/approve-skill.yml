name: Approve Skill Submission

on:
  issues:
    types:
      - labeled

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  approve-skill:
    if: github.event.label.name == 'skill-approved'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzipper
        run: npm install unzipper

      - name: Process skill submission
        uses: actions/github-script@v7
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs         = require('fs');
            const path       = require('path');
            const https      = require('https');
            const http       = require('http');
            const unzipper   = require(path.join(process.env.GITHUB_WORKSPACE, 'node_modules/unzipper'));

            // ── Gate: only process skill-submission issues ────────────────────
            const issueData  = context.payload.issue;
            const labelNames = issueData.labels.map(l => l.name);

            if (!labelNames.includes('skill-submission')) {
              core.info('Issue does not have skill-submission label. Skipping.');
              return;
            }

            // ── Parse issue body ──────────────────────────────────────────────
            function parseIssueBody(body) {
              const result = {};
              const parts  = (body || '').split(/^### /m);
              for (const part of parts) {
                if (!part.trim()) continue;
                const nl = part.indexOf('\n');
                if (nl === -1) continue;
                const heading = part.slice(0, nl).trim();
                const value   = part.slice(nl).trim();
                result[heading] = value;
              }
              return result;
            }

            const fields = parseIssueBody(issueData.body);

            function getLine(label) {
              return (fields[label] || '').split('\n')[0].trim();
            }
            function getBlock(label) {
              return (fields[label] || '').trim();
            }
            function sanitize(val) {
              return (val === '_No response_' || val === '') ? '' : val;
            }

            const title         = getLine('Title');
            const description   = getBlock('Description');
            const tool          = getLine('Tool');
            const customerGroup = sanitize(getLine('Customer Group'));
            const task          = sanitize(getLine('Task'));
            const tagsRaw       = getLine('Tags');
            const author        = getLine('Author');
            const authorRole    = sanitize(getLine('Author Role'));
            const version       = getLine('Version') || '1.0.0';
            const rawOnePager   = getLine('One-Pager URL');
            const onePagerUrl   = (rawOnePager && rawOnePager !== '_No response_' && rawOnePager.startsWith('http')) ? rawOnePager : '';
            const rawContent    = getBlock('Skill File Content');

            // ── Validate required fields ──────────────────────────────────────
            if (!title || !tool || !author || !rawContent) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueData.number,
                body: [
                  '**Skill approval failed.** The following required fields are missing or empty:',
                  !title      ? '- Title' : '',
                  !tool       ? '- Tool' : '',
                  !author     ? '- Author' : '',
                  !rawContent ? '- Skill File Content' : '',
                  '',
                  'Please edit the issue to correct these fields, then remove and re-add the `skill-approved` label.',
                ].filter(Boolean).join('\n'),
              });
              core.setFailed('Required fields missing from issue body.');
              return;
            }

            // ── Helper: download a URL to a buffer ────────────────────────────
            function download(url) {
              return new Promise((resolve, reject) => {
                const client = url.startsWith('https') ? https : http;
                client.get(url, res => {
                  if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                    return download(res.headers.location).then(resolve).catch(reject);
                  }
                  if (res.statusCode !== 200) return reject(new Error(`Download failed: ${res.statusCode}`));
                  const chunks = [];
                  res.on('data', c => chunks.push(c));
                  res.on('end', () => resolve(Buffer.concat(chunks)));
                  res.on('error', reject);
                });
              });
            }

            // ── Helper: extract .md from a zip buffer ─────────────────────────
            async function extractMdFromZip(buf) {
              const dir     = await unzipper.Open.buffer(buf);
              // Filter: path ends in .md and does not end in / (exclude directory entries)
              const mdFiles = dir.files.filter(f => f.path.endsWith('.md') && !f.path.endsWith('/'));
              core.info(`Found ${mdFiles.length} .md file(s) in zip: ${mdFiles.map(f => f.path).join(', ')}`);
              if (mdFiles.length === 0) throw new Error('No .md file found inside the zip.');
              // Prefer SKILL.md anywhere, then shallowest path, then first found
              const preferred = mdFiles.find(f => path.basename(f.path) === 'SKILL.md')
                             || mdFiles.sort((a, b) => a.path.split('/').length - b.path.split('/').length)[0];
              core.info(`Extracting ${preferred.path} from zip`);
              const content = await preferred.buffer();
              return content.toString('utf8');
            }

            // ── Resolve skill content: file upload or pasted text ─────────────
            let skillContent     = '';
            let originalFilename = '';
            let zipBuf           = null; // held in memory until skillId is known
            const attachmentMatch = rawContent.match(/\[.*?\]\((https:\/\/github\.com\/user-attachments\/files\/[^\)]+)\)/);

            if (attachmentMatch) {
              const fileUrl      = attachmentMatch[1];
              const originalName = (attachmentMatch[0].match(/\[([^\]]+)\]/) || [])[1] || '';
              core.info(`Detected uploaded file: ${originalName} — downloading from ${fileUrl}`);
              try {
                const buf = await download(fileUrl);
                if (originalName.toLowerCase().endsWith('.zip')) {
                  core.info('File is a zip — extracting .md content');
                  skillContent     = await extractMdFromZip(buf);
                  zipBuf           = buf; // save for later once skillId exists
                  originalFilename = originalName.replace(/\s+/g, '-');
                } else {
                  skillContent     = buf.toString('utf8');
                  originalFilename = originalName.replace(/\s+/g, '-');
                }
                core.info('File content resolved successfully');
              } catch (e) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issueData.number,
                  body: `**Skill approval failed.** Could not download or read the uploaded file.\n\nError: ${e.message}\n\nPlease re-upload the file or paste the raw markdown text directly, then re-add the \`skill-approved\` label.`,
                });
                core.setFailed('File download/extraction failed: ' + e.message);
                return;
              }
            } else {
              core.info('No file attachment detected — using pasted text');
              skillContent = rawContent;
              const fenceMatch = skillContent.match(/^```[^\n]*\n([\s\S]*?)\n```$/);
              if (fenceMatch) {
                skillContent = fenceMatch[1];
                core.info('Stripped outer code fence from pasted content');
              }
            }

            if (!skillContent.trim()) {
              core.setFailed('Skill content is empty after processing.');
              return;
            }

            // ── Parse tags ────────────────────────────────────────────────────
            const tags = tagsRaw.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);

            // ── Generate slug and unique skill ID ─────────────────────────────
            function slugify(text) {
              return text.toLowerCase()
                .replace(/[^a-z0-9\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '');
            }

            const toolPrefix = slugify(tool).split('-')[0].slice(0, 10);
            const baseId     = `${toolPrefix}-${slugify(title)}`;

            // ── Load existing skills.json ─────────────────────────────────────
            const ws         = process.env.GITHUB_WORKSPACE;
            const skillsPath = path.join(ws, 'data', 'skills.json');
            let skills = [];
            try {
              skills = JSON.parse(fs.readFileSync(skillsPath, 'utf8'));
            } catch (e) {
              core.warning('Could not read skills.json: ' + e.message);
            }

            const existingIds = new Set(skills.map(s => s.id));
            let skillId = baseId, counter = 2;
            while (existingIds.has(skillId)) skillId = `${baseId}-${counter++}`;

            const filename    = `${skillId}.md`;
            const zipFilename = zipBuf ? `${skillId}.zip` : '';
            const today       = new Date().toISOString().slice(0, 10);

            // ── Build new skill object ────────────────────────────────────────
            const newSkill = {
              id: skillId, title, description, author,
              authorRole:      authorRole || '',
              tool,
              customerGroup:   customerGroup || '',
              task:            task || '',
              tags, version, filename,
              originalFilename: originalFilename || filename,
              zipFilename:      zipFilename,
              onePagerUrl:      onePagerUrl || '',
              communityRating:  0,
              ratingCount:      0,
              dateAdded:        today,
              featured:         false,
              status:           'approved',
            };

            // ── Write files to disk ───────────────────────────────────────────
            fs.writeFileSync(skillsPath, JSON.stringify([...skills, newSkill], null, 2) + '\n', 'utf8');
            core.info(`Updated skills.json with: ${skillId}`);

            fs.writeFileSync(path.join(ws, 'skill-files', filename), skillContent + '\n', 'utf8');
            core.info(`Created skill-files/${filename}`);

            if (zipBuf) {
              fs.writeFileSync(path.join(ws, 'skill-files', zipFilename), zipBuf);
              core.info(`Saved zip as skill-files/${zipFilename}`);
            }

            // ── Git: branch, commit, push ─────────────────────────────────────
            const branch = `skill/${skillId}`;

            let branchExists = false;
            try {
              await exec.exec('git', ['ls-remote', '--exit-code', '--heads', 'origin', branch]);
              branchExists = true;
            } catch (e) { /* expected */ }

            if (branchExists) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueData.number,
                body: `Branch \`${branch}\` already exists — a PR may have already been created. Check open PRs before re-approving.`,
              });
              return;
            }

            await exec.exec('git', ['config', 'user.name',  'github-actions[bot]']);
            await exec.exec('git', ['config', 'user.email', 'github-actions[bot]@users.noreply.github.com']);
            await exec.exec('git', ['checkout', '-b', branch]);
            const filesToAdd = ['data/skills.json', `skill-files/${filename}`];
            if (zipFilename) filesToAdd.push(`skill-files/${zipFilename}`);
            await exec.exec('git', ['add', ...filesToAdd]);
            await exec.exec('git', ['commit', '-m', `feat: add skill "${title}" (closes #${issueData.number})`]);
            await exec.exec('git', ['push', 'origin', branch]);

            // ── Open PR ───────────────────────────────────────────────────────
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Add skill: ${title}`,
              head: branch, base: 'main',
              body: [
                `## New Skill: ${title}`,
                ``,
                `Auto-generated from issue #${issueData.number}.`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| Author | ${author}${authorRole ? ` (${authorRole})` : ''} |`,
                `| Tool | \`${tool}\` |`,
                `| Customer Group | ${customerGroup || '—'} |`,
                `| Task | ${task || '—'} |`,
                `| Version | ${version} |`,
                `| Skill ID | \`${skillId}\` |`,
                `| Filename | \`skill-files/${filename}\` |`,
                ``,
                `### Review Checklist`,
                ``,
                `- [ ] Skill content is accurate and appropriate`,
                `- [ ] No customer-confidential data included`,
                `- [ ] Tags are consistent with existing taxonomy`,
                `- [ ] \`skills.json\` entry is valid JSON with \`"status": "approved"\``,
                `- [ ] Skill file exists at \`skill-files/${filename}\``,
                ``,
                `Merging triggers an automatic redeploy.`,
              ].join('\n'),
            });

            // ── Comment on issue ──────────────────────────────────────────────
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issueData.number,
              body: `Your skill submission has been queued for review!\n\n**Pull request:** ${pr.data.html_url}\n\nOnce merged, **${title}** will appear on the site automatically.`,
            });

            core.info(`Done. PR #${pr.data.number} opened for "${title}".`);
